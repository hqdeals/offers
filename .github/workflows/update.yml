name: Update

on:
  schedule:
    - cron: '0 0 * * *'  # Run every hour '0 * * * *'
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/cleanup.yml'

jobs:
  get-categories:
    runs-on: ubuntu-latest
    outputs:
      categories: ${{ steps.get-categories.outputs.categories }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Fetch categories
      id: get-categories
      run: |
        CATEGORIES=$(npm run parse:categories --silent -- ${{vars.OFFERS_URL}} categories.json)
        echo "categories=$CATEGORIES" >> "$GITHUB_OUTPUT"
    
    - name: Upload categories
      uses: actions/upload-artifact@v4
      with:
        name: categories
        path: categories.json

  get-offers:
    runs-on: ubuntu-latest
    needs: get-categories

    strategy:
      matrix: 
        category: ${{ fromJson(needs.get-categories.outputs.categories).categories }}
      max-parallel: 2

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Fetch offers for category ${{ matrix.category.name }}
      run: |
        npm run parse:offers -- ${{vars.OFFERS_URL}} ${{ matrix.category.value }} ${{ matrix.category.value }}.json
    
    - name: Upload offers
      uses: actions/upload-artifact@v4
      with:
        name: offers-${{ matrix.category.value }}
        path: ${{ matrix.category.value }}.json

  deploy:
    runs-on: ubuntu-latest
    needs: [get-categories, get-offers]     
    
    steps:
    - name: Checkout offers
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: tmp

    - name: Remove old offers
      working-directory: tmp
      run: |
        set -e
        if [ -z "${{ vars.OFFERS_RETENTION_DAYS }}" ]; then
          echo "ERROR: OFFERS_RETENTION_DAYS is not set."
          exit 1
        fi
        CUTOFF_DATE=$(date -u -d "-${{ vars.OFFERS_RETENTION_DAYS }} days" +%Y-%m-%d)
        echo "Cutoff date (UTC): ${CUTOFF_DATE}"
        for year_dir in *; do
          [ -d "$year_dir" ] || continue
          year=$(basename "$year_dir")
          for month_dir in "$year_dir"/*; do
            [ -d "$month_dir" ] || continue
            month=$(basename "$month_dir")
            for day_dir in "$month_dir"/*; do
              [ -d "$day_dir" ] || continue
              day=$(basename "$day_dir")
              dir_date=$(printf "%s-%s-%s" "$year" "$month" "$day")
              if [[ "$dir_date" < "$CUTOFF_DATE" ]]; then
                echo "Removing $day_dir (date ${dir_date})"
                rm -rf "$day_dir"
              else
                echo "Keeping $day_dir (date ${dir_date})"
              fi
            done
          done
        done

    - uses: actions/download-artifact@v4
      with:
        name: categories
        path: tmp

    - uses: actions/download-artifact@v4
      with:
        pattern: offers-*
        path: "tmp/${{ fromJson(needs.get-categories.outputs.categories).dir }}"
        merge-multiple: true

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: tmp
