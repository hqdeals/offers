name: Cleanup

on:
  schedule:
    - cron: '0 0 * * *' # daily at midnight UTC
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/cleanup.yml'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      RETENTION_DAYS: ${{ vars.OFFERS_RETENTION_DAYS }}

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove old offers
        run: |
          set -e
          # require RETENTION_DAYS to be set (no default)
          if [ -z "${RETENTION_DAYS}" ]; then
            echo "ERROR: RETENTION_DAYS is not set. Set repository variable OFFERS_RETENTION_DAYS."
            exit 1
          fi
          CUTOFF_DATE=$(date -u -d "-${RETENTION_DAYS} days" +%Y-%m-%d)
          echo "Cutoff date (UTC): ${CUTOFF_DATE}"
          for year_dir in offers/*; do
            [ -d "$year_dir" ] || continue
            year=$(basename "$year_dir")
            for month_dir in "$year_dir"/*; do
              [ -d "$month_dir" ] || continue
              month=$(basename "$month_dir")
              for day_dir in "$month_dir"/*; do
                [ -d "$day_dir" ] || continue
                day=$(basename "$day_dir")
                dir_date=$(printf "%s-%s-%s" "$year" "$month" "$day")
                if [[ "$dir_date" < "$CUTOFF_DATE" ]]; then
                  echo "Removing $day_dir (date ${dir_date})"
                  rm -rf "$day_dir"
                else
                  echo "Keeping $day_dir (date ${dir_date})"
                fi
              done
            done
          done

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(cleanup): remove old offers"
            git push origin gh-pages
          fi
