name: Update Offers Hourly

on:
  schedule:
    - cron: '0 0 * * *'  # Run every hour '0 * * * *'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/update-offers.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-offers:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Fetch and update offers
      run: |
        mkdir -p offers
        for category in computer-zubehor elektro-grogerate elektronik-foto; do
          curl -s "https://de.camelcamelcamel.com/top_drops/feed?bn=$category&d=1&i=1&s=relative&t=relative" -o "offers/$category.xml"
        done

    - name: Commit and push if changed
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git add offers/*.xml
        git diff --staged --quiet || (git commit -m "Update offers data" && git push)
